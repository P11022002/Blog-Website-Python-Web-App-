{% extends 'base.html' %}

{% block title %}Home - Blog{% endblock %}

{% block content %}
<h2>Recent Posts</h2>
{% for post in posts %}
<div class="post">
    <h3><a href="{{ url_for('post', post_id=post.id) }}">{{ post.title }}</a></h3>
    <p>{{ post.content[:100] }}...</p>
    <small>{{ post.date_created.strftime('%Y-%m-%d %H:%M') }}</small>
</div>
{% endfor %}
{% endblock %}
